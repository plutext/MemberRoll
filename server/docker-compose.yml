# Keycloak owns identity. Dev mode, config-as-code — the realm in
# keycloak/ is imported at startup and is the single source of Keycloak
# configuration (clients, roles, test users). Port 8081: Tomcat has 8080.
#
#   docker compose up -d      # start (first run pulls the image)
#   docker compose logs -f    # watch startup ("Imported realm memberroll")
#   docker compose stop       # pause, keeping state (registered users survive)
#   docker compose down       # remove: next up re-imports the realm fresh
#
# Keycloak deliberately has NO persistent volume: the checked-in realm
# import IS the configuration, so a fresh container is always a known
# state. Users registered interactively live only until `down` — dev
# semantics. (Production is the opposite: deploy/compose.yml runs
# Keycloak on Postgres and the database is authoritative after the
# one-time import.)
#
# Admin console: http://localhost:8081/ — bootstrap credentials below
# (dev only; override via env for anything internet-facing).
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
