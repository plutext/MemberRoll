# Keycloak owns identity. Dev mode, config-as-code — the realm in
# keycloak/ is imported at startup and is the single source of Keycloak
# configuration (clients, roles, test users). Port 18081: this project's
# dev stack lives on 18xxx ports (Tomcat 18080 via cargo) so it can run
# beside other projects' dev stacks on the conventional 8080/8081.
#
#   docker compose up -d      # start (first run pulls the image)
#   docker compose logs -f    # watch startup ("Imported realm memberroll")
#   docker compose stop       # pause, keeping state (registered users survive)
#   docker compose down       # remove: next up re-imports the realm fresh
#
# Keycloak deliberately has NO persistent volume: the checked-in realm
# import IS the configuration, so a fresh container is always a known
# state. Users registered interactively live only until `down` — dev
# semantics. (Production is the opposite: deploy/compose.yml runs
# Keycloak on Postgres and the database is authoritative after the
# one-time import.)
#
# Admin console: http://localhost:18081/ — bootstrap credentials below
# (dev only; override via env for anything internet-facing).
# Explicit project name: without it compose infers "server" from this
# directory's name, which COLLIDES with any other checkout whose compose
# also lives in a server/ dir (docker compose up here would silently
# recreate that project's keycloak/postgres containers with THIS file's
# config). Container names become memberroll-keycloak-1 etc.
name: memberroll

services:
  # The app's register database. Same dev semantics as Keycloak — NO
  # volume: `down` wipes it, Flyway recreates the schema at the next
  # webapp start, fixtures reseed. Host port 5433 because dev boxes
  # often run their own Postgres on 5432.
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: memberroll
      POSTGRES_USER: memberroll
      POSTGRES_PASSWORD: memberroll
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-18081}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  # Mail catcher for dev (CR-004 receipts + lost-link; CR-005 will lean on
  # it harder): SMTP on 18026, browse sent mail at http://localhost:18025.
  # Same no-volume dev semantics — `down` discards the mailbox.
  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_UI_PORT:-18025}:8025"
      - "${MAILPIT_SMTP_PORT:-18026}:1025"
