<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My membership</title>
    <link rel="stylesheet" href="../shared/pico.classless.min.css">
    <style>
        /* Overrides only — Pico (linked above) carries the base look. */
        /* [hidden] must beat the claim modal's display:flex below — an author
           display on the same element silently overrides the hidden attribute
           otherwise (a real bug once shipped: page greyed out and untappable
           because the "hidden" modal still covered it). */
        [hidden] { display: none !important; }
        #status { padding: .5rem .8rem; margin-bottom: 1rem; border-radius: var(--pico-border-radius);
            background: var(--pico-card-sectioning-background-color); }
        #status.warn { background: var(--pico-del-color); color: #fff; }
        #message { min-height: 1.4rem; color: var(--pico-ins-color); }
        #message.error { color: var(--pico-del-color); white-space: pre-wrap; }
        .membership-card { border: 1px solid var(--pico-muted-border-color);
            border-radius: var(--pico-border-radius); padding: .8rem 1rem; margin: .6rem 0; }
        .membership-card h3 { margin: 0 0 .3rem; font-size: 1.05rem; }
        .membership-card p { margin: .2rem 0 .6rem; }
        /* CR-017 membership card */
        .card-region { margin-top: .6rem; padding-top: .6rem;
            border-top: 1px dashed var(--pico-muted-border-color); }
        .card-region h4 { margin: .2rem 0 .4rem; font-size: .95rem; }
        .card-image { max-width: 100%; width: 420px; height: auto; display: block;
            border: 1px solid var(--pico-muted-border-color); border-radius: 8px; }
        .card-actions { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
            margin: .5rem 0 0; }
        .card-actions a[role=button], .card-actions button { margin: 0; width: auto; }
        .card-actions .muted { color: var(--pico-muted-color); font-size: .85rem; }
        /* the CR-009 status badges, colours matched to the admin panel */
        .badge { display: inline-block; padding: .1rem .55rem; border-radius: 999px;
            font-size: .8rem; font-weight: 600; border: none; }
        .badge-green { background: #d9f2df; color: #14652d; }
        .badge-amber { background: #fdeece; color: #7a5a10; }
        .badge-blue  { background: #dbe9fb; color: #1c4f8a; }
        .badge-grey  { background: #e6e6e6; color: #555; }
        /* the claim modal keeps its own overlay mechanism (shipped-bug history
           around [hidden]; not worth re-plumbing to <dialog>); only its
           hardcoded colours move to Pico variables so dark mode stays legible */
        #claim { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.5);
                 display: flex; align-items: center; justify-content: center; }
        #claim .card { background: var(--pico-card-background-color); color: var(--pico-color);
            border-radius: var(--pico-border-radius); padding: 1.2rem 1.5rem; max-width: 22rem; }
        #claim button { display: block; width: 100%; margin: .4rem 0; }
        #claim .error { color: var(--pico-del-color); min-height: 1.2rem; }
    </style>
</head>
<body>
<main>
<header>
    <h1>My membership</h1>
    <div id="status">Checking login…</div>
    <div id="message"></div>
</header>

<!-- CR-006: the member self-serve view — filled by app.js from
     GET /api/me/membership; no lookup form on purpose (a lookup would be
     an enumeration oracle — the pay page's lost-link flow is the
     self-service recovery for pay links). -->
<section id="membershipSection" hidden>
    <p id="notLinked" hidden></p>
    <div id="linked" hidden>
        <div id="memberships"></div>
        <div id="historyWrap" hidden>
            <h2>Past periods</h2>
            <table id="history">
                <thead><tr><th>Period</th><th>Type</th><th>Status</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</section>
</main>

<div id="claim" hidden></div>

<script src="../shared/sha256.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/claim.js"></script>
<script src="app.js"></script>
</body>
</html>
